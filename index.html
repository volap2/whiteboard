<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Georgia', serif;
    cursor: default;
    user-select: none;
  }

  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #hint p {
    font-size: 13px;
    color: #c8c8c8;
    letter-spacing: 0.08em;
    line-height: 2;
  }
  #hint .key {
    display: inline-block;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: #c0c0c0;
    font-family: monospace;
  }
  #hint.hidden { opacity: 0; }

  /* ── items ── */
  .item {
    position: absolute;
    cursor: grab;
    min-width: 40px;
    min-height: 20px;
  }
  .item:active { cursor: grabbing; }
  .item.selected {
    outline: 1.5px solid #d0d0d0;
    outline-offset: 4px;
  }
  .item-text {
    font-family: 'Georgia', serif;
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    padding: 2px 4px;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .item-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border-radius: 2px;
  }
  .delete-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 18px;
    height: 18px;
    background: #e0e0e0;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 10px;
    color: #888;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: #f0a0a0; color: #fff; }
  .item.selected .delete-btn { display: flex; }
  .resize-handle {
    position: absolute;
    bottom: -6px;
    right: -6px;
    width: 14px;
    height: 14px;
    background: #fff;
    border: 1.5px solid #c8c8c8;
    border-radius: 50%;
    cursor: se-resize;
    display: none;
    z-index: 10;
  }
  .item.selected .resize-handle { display: block; }

  @keyframes pasteFlash {
    0%  { opacity: 0; transform: scale(0.96); }
    100%{ opacity: 1; transform: scale(1); }
  }
  .item { animation: pasteFlash 0.2s ease forwards; }

  /* ── floating buttons ── */
  #toolbar {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
    z-index: 50;
  }

  .fab {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0px;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
  }

  .fab-label {
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: #aaa;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    white-space: nowrap;
    transition: max-width 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
    pointer-events: none;
  }

  .fab:hover .fab-label {
    max-width: 80px;
    opacity: 1;
    margin-right: 8px;
  }

  .fab-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #d0d0d0;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .fab:hover .fab-dot {
    transform: scale(1.3);
  }

  #shareBtn .fab-dot { background: #1a1a1a; }
  #shareBtn:hover .fab-dot { background: #444; }
  #shareBtn .fab-label { color: #555; }

  #clearBtn:hover .fab-dot { background: #f0a0a0; }

  /* status */
  #status {
    position: fixed;
    bottom: 28px;
    left: 28px;
    font-size: 11px;
    color: #ccc;
    font-family: monospace;
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* toast */
  #toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #1a1a1a;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-family: monospace;
    letter-spacing: 0.04em;
    transition: transform 0.3s ease;
    z-index: 100;
    cursor: pointer;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="hint">
  <p><span class="key">⌘V</span> &nbsp;or&nbsp; <span class="key">Ctrl V</span> &nbsp;to paste anything</p>
  <p>text &nbsp;·&nbsp; images &nbsp;·&nbsp; screenshots</p>
  <p style="margin-top:8px; font-size:11px; color:#d8d8d8;">drag corner to resize &nbsp;·&nbsp; double-click text to edit</p>
</div>

<div id="toolbar">
  <button class="fab" id="clearBtn">
    <span class="fab-label">clear</span>
    <span class="fab-dot"></span>
  </button>
  <button class="fab" id="shareBtn">
    <span class="fab-label">share</span>
    <span class="fab-dot"></span>
  </button>
</div>

<div id="status"></div>
<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://owfpkdogtulgeyiwjrre.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZnBrZG9ndHVsZ2V5aXdqcnJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTE0ODMsImV4cCI6MjA5MDQ2NzQ4M30.EX4KVlfSA95D5SZvnFbtpD9Whvr-qR62GlrU83PEqck';

  const hint     = document.getElementById('hint');
  const statusEl = document.getElementById('status');
  const shareBtn = document.getElementById('shareBtn');
  const clearBtn = document.getElementById('clearBtn');
  const toast    = document.getElementById('toast');

  let items    = [];
  let selected = null;
  let dragging = false, dragOffset = { x: 0, y: 0 };
  let resizing = false, resizeStart = {}, resizeEl = null;

  function setStatus(msg, fade) {
    statusEl.style.opacity = '1';
    statusEl.textContent = msg;
    if (fade) setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
  }

  function updateHint() {
    items.length ? hint.classList.add('hidden') : hint.classList.remove('hidden');
  }

  function selectItem(el) {
    if (selected) selected.classList.remove('selected');
    selected = el;
    if (selected) selected.classList.add('selected');
  }

  function randomPos() {
    return {
      x: window.innerWidth  / 2 + (Math.random() - 0.5) * 300 - 100,
      y: window.innerHeight / 2 + (Math.random() - 0.5) * 200 - 60,
    };
  }

  function createItem(type, content, x, y, w, h, skipAnim) {
    const el = document.createElement('div');
    el.className = `item item-${type}`;
    if (skipAnim) el.style.animation = 'none';
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.width  = (w || (type === 'text' ? 300 : 320)) + 'px';
    el.style.height = (h || (type === 'text' ?  80 : 240)) + 'px';

    if (type === 'text') {
      const span = document.createElement('div');
      span.className = 'item-text';
      span.textContent = content;
      span.addEventListener('dblclick', e => {
        e.stopPropagation();
        span.contentEditable = 'true';
        span.style.cursor = 'text';
        span.focus();
      });
      span.addEventListener('blur', () => {
        span.contentEditable = 'false';
        span.style.cursor = '';
      });
      el.appendChild(span);
    } else if (type === 'image') {
      const img = document.createElement('img');
      img.src = content;
      img.draggable = false;
      el.appendChild(img);
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      el.remove();
      items = items.filter(i => i !== el);
      if (selected === el) selected = null;
      updateHint();
    });
    el.appendChild(delBtn);

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      resizing = true; resizeEl = el;
      resizeStart = { mouseX: e.clientX, mouseY: e.clientY, w: el.offsetWidth, h: el.offsetHeight };
    });
    el.appendChild(handle);

    el.addEventListener('mousedown', e => {
      if (e.target === delBtn || e.target === handle) return;
      if (e.target.contentEditable === 'true') return;
      selectItem(el);
      dragging = true;
      dragOffset.x = e.clientX - el.offsetLeft;
      dragOffset.y = e.clientY - el.offsetTop;
      e.preventDefault();
    });

    document.body.appendChild(el);
    items.push(el);
    selectItem(el);
    updateHint();
    return el;
  }

  function serialise() {
    return items.map(el => ({
      type:    el.classList.contains('item-text') ? 'text' : 'image',
      content: el.classList.contains('item-text')
               ? el.querySelector('.item-text').textContent
               : el.querySelector('img').src,
      x: el.offsetLeft, y: el.offsetTop,
      w: el.offsetWidth, h: el.offsetHeight,
    }));
  }

  function deserialise(data) {
    data.forEach(d => createItem(d.type, d.content, d.x, d.y, d.w, d.h, true));
  }

  async function dbSave(data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/boards`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ data: JSON.stringify(data) })
    });
    return res.json();
  }

  async function dbLoad(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/boards?id=eq.${id}&select=data`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    return rows[0]?.data ? JSON.parse(rows[0].data) : null;
  }

  shareBtn.addEventListener('click', async () => {
    if (!items.length) { setStatus('nothing to share', true); return; }
    setStatus('saving…');
    shareBtn.style.pointerEvents = 'none';
    try {
      const rows = await dbSave(serialise());
      const id = rows[0]?.id;
      if (!id) throw new Error();
      const url = `${location.origin}${location.pathname}?b=${id}`;
      await navigator.clipboard.writeText(url);
      setStatus('copied!', true);
      toast.textContent = '🔗 link copied — click to open';
      toast.classList.add('show');
      toast.onclick = () => window.open(url, '_blank');
      setTimeout(() => toast.classList.remove('show'), 4000);
    } catch(e) {
      setStatus('error :(', true);
    }
    shareBtn.style.pointerEvents = '';
  });

  clearBtn.addEventListener('click', () => {
    items.forEach(el => el.remove());
    items = []; selected = null;
    setStatus('', false);
    updateHint();
  });

  document.addEventListener('mousemove', e => {
    if (dragging && selected) {
      selected.style.left = (e.clientX - dragOffset.x) + 'px';
      selected.style.top  = (e.clientY - dragOffset.y) + 'px';
    }
    if (resizing && resizeEl) {
      resizeEl.style.width  = Math.max(80,  resizeStart.w + e.clientX - resizeStart.mouseX) + 'px';
      resizeEl.style.height = Math.max(40,  resizeStart.h + e.clientY - resizeStart.mouseY) + 'px';
    }
  });
  document.addEventListener('mouseup', () => { dragging = false; resizing = false; resizeEl = null; });
  document.body.addEventListener('mousedown', e => {
    if (e.target === document.body || e.target === hint) selectItem(null);
  });

  document.addEventListener('paste', e => {
    e.preventDefault();
    const clip = e.clipboardData;
    const pos  = randomPos();
    for (const item of clip.items) {
      if (item.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = ev => createItem('image', ev.target.result, pos.x, pos.y);
        reader.readAsDataURL(item.getAsFile());
        return;
      }
    }
    const text = clip.getData('text/plain').trim();
    if (text) createItem('text', text, pos.x, pos.y);
  });

  document.addEventListener('keydown', e => {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selected) {
      if (selected.querySelector('[contenteditable="true"]')) return;
      selected.remove();
      items = items.filter(i => i !== selected);
      selected = null;
      updateHint();
    }
  });

  (async () => {
    const id = new URLSearchParams(location.search).get('b');
    if (!id) return;
    setStatus('loading…');
    try {
      const data = await dbLoad(id);
      if (data) { deserialise(data); setStatus('', false); }
      else setStatus('board not found', true);
    } catch { setStatus('error loading', true); }
  })();
</script>
</body>
</html>
